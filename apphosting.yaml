# Si cambias de proyecto, actualiza aquí o en la consola (la consola tiene prioridad).
#
# Documentación: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  minInstances: 0
  maxInstances: 10
  cpu: 1
  memoryMiB: 512

env:
