# Firebase App Hosting — ajustes de runtime.
# Las variables NEXT_PUBLIC_* y secretos: configúralas en
# Firebase Console → App Hosting → tu backend → Environment (no commitear valores reales).
#
# Documentación: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  minInstances: 0
  maxInstances: 10
  cpu: 1
  memoryMiB: 512
